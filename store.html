<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcuLab | The Aisle Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a href="index.html" class="logo">🍃 CalcuLab</a>
    <nav>
        <a href="index.html">Home</a>
        <a href="guide.html">Starter Guide</a> 
        <a href="store.html" class="active">Aisle Store</a>
        <a href="calcu.html">Quantum Calculator</a>
    </nav>
</header>

<div class="store-container">
    <main class="store-main">
        <div class="products-deck-grid" id="productsDeckGrid"></div>
    </main>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>Acquired Modules</h2>
            <span class="cart-count-bubble" id="cartCountBubble">0</span>
        </div>
        <div class="cart-items-wrapper" id="cartItemsWrapper"></div>
        <div class="cart-footer">
            <button class="primary-btn" style="width: 100%;" onclick="routeToCalculatorMatrix()">Load Elements inside Portal</button>
        </div>
    </div>
</div>

<div class="toggle-cart-trigger" onclick="toggleCartDrawer()">🛒</div>

<footer>
    <div class="footer-tagline">Calculate Faster, Progress Faster</div>
    <p class="footer-main-text">All elements are calculated from direct distributor inventory catalogs.</p>
    <div class="farmspherica-badge">A Farmspherica Innovation</div>
    <p class="footer-sub-text" style="margin-top:0.75rem;">© 2026 CalcuLab. All rights reserved.</p>
</footer>

<script src="script.js"></script>
<script>
    let shoppingCart = JSON.parse(localStorage.getItem('calcuLabCart')) || [];

    function toggleCartDrawer() {
        document.body.classList.toggle('cart-active');
    }

    function renderStoreProducts() {
        const grid = document.getElementById('productsDeckGrid');
        if (!grid) return;

        grid.innerHTML = catalogItems.map(item => `
            <div class="product-hardware-card">
                <div>
                    <div class="prod-meta-head">
                        <div class="prod-icon-box">${item.icon}</div>
                        <div class="prod-cost-tag">₹${item.price.toFixed(2)}</div>
                    </div>
                    <h3>${item.name}</h3>
                    <p>${item.desc}</p>
                </div>
                <button class="secondary-btn" style="width:100%; font-size:0.8rem; padding:0.6rem;" onclick="addHardwareToCart('${item.id}')">Acquire Material</button>
            </div>
        `).join('');
    }

    window.addHardwareToCart = function(id) {
        const prod = catalogItems.find(i => i.id === id);
        if (prod) {
            shoppingCart.push(prod);
            localStorage.setItem('calcuLabCart', JSON.stringify(shoppingCart));
            renderCartUI();
            if(!document.body.classList.contains('cart-active')) {
                toggleCartDrawer();
            }
        }
    };

    window.removeCartItem = function(idx) {
        shoppingCart.splice(idx, 1);
        localStorage.setItem('calcuLabCart', JSON.stringify(shoppingCart));
        renderCartUI();
    };

    function routeToCalculatorMatrix() {
        if(shoppingCart.length === 0) {
            alert('Please acquire at least one module framework to process.');
            return;
        }
        window.location.href = 'calcu.html?autoLoad=true';
    }

    function renderCartUI() {
        const wrapper = document.getElementById('cartItemsWrapper');
        const badgeCount = document.getElementById('cartCountBubble');
        
        badgeCount.textContent = shoppingCart.length;

        if (shoppingCart.length === 0) {
            wrapper.innerHTML = `<p class="empty-cart-notice">No materials acquired yet. Browse components...</p>`;
            return;
        }

        wrapper.innerHTML = shoppingCart.map((item, idx) => `
            <div class="cart-item-row">
                <div class="cart-item-details">
                    <h4>${item.icon} ${item.name}</h4>
                    <p>🔒 Signal Locked</p>
                </div>
                <button class="remove-item-btn" onclick="removeCartItem(${idx})">Remove</button>
            </div>
        `).join('');
    }

    document.addEventListener("DOMContentLoaded", () => {
        renderStoreProducts();
        renderCartUI();
    });
</script>
</body>
</html>
